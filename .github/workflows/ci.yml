name: Deepiri CI - deepiri-modelkit

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  ci:
    name: Format, Type Check, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Dependency compatibility
        run: pip check

      - name: Check formatting
        run: black --check src/

      - name: Type check
        run: mypy src/ || true

      - name: Run tests
        run: pytest

      - name: Build package
        run: pip install build && python -m build
